<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Agent Panel</title>
    <link rel="stylesheet" href="panel.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- ═══════════════════════════════════════════
     FLOATING ACTION BUTTON (FAB)
     Always visible at bottom-right
═══════════════════════════════════════════ -->
    <button id="agentFab" aria-label="Open Browser Agent">
        <svg class="fab-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z"
                fill="currentColor" />
        </svg>
        <span class="fab-badge" id="fabBadge"></span>
    </button>

    <!-- ═══════════════════════════════════════════
     SIDE PANEL
═══════════════════════════════════════════ -->
    <div id="agentPanel" class="panel" role="dialog" aria-label="Browser Agent">

        <!-- Header -->
        <div class="panel-header">
            <div class="panel-header-left">
                <div class="panel-avatar">
                    <svg viewBox="0 0 24 24" fill="none">
                        <rect x="3" y="3" width="18" height="18" rx="4" fill="rgba(255,255,255,0.1)" />
                        <path d="M8 9h8M8 12h5M8 15h6" stroke="white" stroke-width="1.5" stroke-linecap="round" />
                    </svg>
                </div>
                <div class="panel-title-block">
                    <span class="panel-title">Browser Agent</span>
                    <span class="panel-url" id="panelUrl">Loading...</span>
                </div>
            </div>
            <div class="panel-header-right">
                <div class="status-badge" id="statusBadge">
                    <span class="status-dot"></span>
                    <span id="statusLabel">Offline</span>
                </div>
                <button class="icon-btn" id="pinBtn" title="Pin panel" aria-label="Pin panel">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L12 15M12 15L8 11M12 15L16 11M5 20H19" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
                <button class="icon-btn" id="clearBtn" title="Clear chat" aria-label="Clear chat">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
                <button class="icon-btn close-btn" id="closePanel" title="Close" aria-label="Close panel">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Quick Action Chips -->
        <div class="quick-actions" id="quickActions">
            <button class="chip" data-prompt="Analyze this page and tell me what it does and what actions I can take.">
                🔍 Analyze Page
            </button>
            <button class="chip" data-prompt="Find all the forms on this page and tell me what each field expects.">
                📋 Fill Form
            </button>
            <button class="chip" data-prompt="What are all the clickable elements on this page? List them.">
                👁️ Show Options
            </button>
            <button class="chip" data-prompt="Extract and summarize all the text content on this page.">
                📄 Extract Text
            </button>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <!-- Messages injected here -->
            <div class="chat-welcome" id="chatWelcome">
                <div class="welcome-icon">🤖</div>
                <p class="welcome-title">Browser Agent</p>
                <p class="welcome-sub">Tell me what to do on this page</p>
            </div>
        </div>

        <!-- Input Bar -->
        <div class="input-area">
            <div class="input-wrapper" id="inputWrapper">
                <button class="attach-btn" id="attachBtn" title="Attach screenshot" aria-label="Attach screenshot">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path
                            d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
                <input type="text" id="msgInput" placeholder="Ask me anything about this page..." autocomplete="off"
                    spellcheck="true">
                <button class="send-btn" id="sendBtn" aria-label="Send message">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z" fill="currentColor" />
                    </svg>
                </button>
            </div>
        </div>

    </div><!-- /.panel -->

    <script src="panel.js"></script>
</body>

</html>
