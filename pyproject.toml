[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",  # line too long — tolerated in prompt strings and long URLs
]

[tool.ruff.lint.per-file-ignores]
"backend/test_*.py" = ["F401", "F811"]   # allow unused imports in test files
"dom-agent/test_*.py" = ["F401", "F811"]
