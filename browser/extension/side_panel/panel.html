<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GHMC Assistant</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="panel-header">
      <div class="logo-container">
        <h2>GHMC Assistant</h2>
      </div>
      <button id="settings-btn" title="User Profile">⚙️</button>
    </header>

    <!-- Context Bar (Shows current tab state) -->
    <div id="context-bar" class="context-bar hidden">
      <div class="context-icon">📄</div>
      <div class="context-details">
        <div class="context-title" id="context-title">Loading...</div>
        <div class="context-url" id="context-url">...</div>
      </div>
    </div>

    <!-- Quick Actions (Only show when page context is loaded) -->
    <div id="quick-actions" class="quick-actions hidden">
      <button class="action-btn" data-action="fill_form">📝 Fill Form</button>
      <button class="action-btn" data-action="checkout_flow">🛒 Checkout Flow</button>
    </div>

    <!-- Chat History -->
    <main id="chat-container" class="chat-container">
      <div class="message system">
        Hi! I'm your GHMC AI Assistant. I can help you read this page, fill out forms, or navigate the site. How can I help?
      </div>
    </main>

    <!-- Input Area -->
    <footer class="panel-footer">
      <div class="input-container">
        <textarea id="chat-input" placeholder="Type a message or instruction..." rows="1"></textarea>
        <button id="send-btn" class="send-btn">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
    </footer>
  </div>
  <script src="panel.js"></script>
</body>
</html>
